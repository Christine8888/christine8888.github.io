---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="/feed.xml">
</head>
<style>
p,
li {
    font-size: 1rem;
}
</style>


<body class = "blog-list-body">
    
    <div class="container blog-post-container"> 
        <div class="back-button">
            <a href="/blog.html"><< back</a>
        </div>
        <h2>{{ page.title }}</h2>
        <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
        {{ content }}
    </div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var popup = null;
    document.querySelectorAll('a.footnote').forEach(function(link) {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            if (popup) popup.remove();
            var id = this.getAttribute('href').substring(1);
            var note = document.getElementById(id);
            if (!note) return;
            var text = note.querySelector('p') ? note.querySelector('p').innerHTML : note.innerHTML;
            // strip the backref link
            text = text.replace(/<a[^>]*class="reversefootnote"[^>]*>.*?<\/a>/g, '').trim();
            popup = document.createElement('div');
            popup.className = 'footnote-popup';
            popup.innerHTML = text;
            document.body.appendChild(popup);
            var rect = this.getBoundingClientRect();
            popup.style.position = 'absolute';
            popup.style.left = rect.left + window.scrollX + 'px';
            popup.style.top = (rect.bottom + window.scrollY + 6) + 'px';
        });
    });
    document.addEventListener('click', function(e) {
        if (popup && !e.target.closest('.footnote') && !e.target.closest('.footnote-popup')) {
            popup.remove();
            popup = null;
        }
    });
});
</script>
</body>
</html>
